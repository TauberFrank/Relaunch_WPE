<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden | Waschplatz-Experten</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: #2D3436;
      background-color: #FAFAF5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #E5E8E6;
      padding: 0 24px;
    }
    .header__inner {
      max-width: 1200px;
      margin: 0 auto;
      height: 68px;
      display: flex;
      align-items: center;
    }
    .logo {
      font-family: 'Cabin', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #2D4A3E;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .content { max-width: 520px; }
    .code {
      font-family: 'Cabin', sans-serif;
      font-size: 96px;
      font-weight: 700;
      color: #E07A5F;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Cabin', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: -0.3px;
      margin-bottom: 16px;
    }
    p {
      color: #636E72;
      margin-bottom: 32px;
    }
    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #E07A5F;
      color: #1A1A1A;
    }
    .btn-primary:hover { background: #d0694f; }
    .btn-secondary {
      background: transparent;
      color: #2D4A3E;
      border: 2px solid #2D4A3E;
    }
    .btn-secondary:hover { background: #2D4A3E; color: #fff; }
    footer {
      background: #2D4A3E;
      padding: 24px;
      text-align: center;
    }
    footer p {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin: 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="/" class="logo">WASCHPLATZ&mdash;EXPERTEN</a>
    </div>
  </header>

  <main class="main">
    <div class="content">
      <div class="code">404</div>
      <h1>Diese Seite gibt es nicht mehr.</h1>
      <p>Möglicherweise wurde die Seite verschoben oder umbenannt. Nutzen Sie einen der Links unten oder starten Sie über die Startseite.</p>
      <div class="btns">
        <a href="/" class="btn btn-primary">Zur Startseite</a>
        <a href="/beratung-kauf/" class="btn btn-secondary">Zur Beratung</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Waschplatz-Experten &mdash; Ihr Bad. Ihre Maße. Unsere Lösung.</p>
  </footer>
</body>
</html>
